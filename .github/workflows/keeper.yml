name: SomniaWatch Keeper - 5min Autonomous Alerts

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes, 24/7, free on GitHub Actions
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger SomniaWatch Keeper Cron
        run: |
          echo "Triggering SomniaWatch keeper at $(date)"
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Accept: application/json" \
            "${{ secrets.KEEPER_CRON_URL }}")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Keeper cron returned non-200: $RESPONSE"
            exit 1
          fi
          DISCORD=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('alerts',{}).get('discord','?'))")
          TELEGRAM=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('alerts',{}).get('telegram','?'))")
          echo "Discord: $DISCORD"
          echo "Telegram: $TELEGRAM"
