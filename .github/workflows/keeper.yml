name: SomniaWatch Keeper

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (GitHub Actions minimum is 5)
  workflow_dispatch:           # allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SomniaWatch Keeper
        run: |
          echo "Triggering SomniaWatch keeper at $(date)"
          RESPONSE=$(curl -s -w "\n%{http_code}" https://somniawatch-git-main-gopichandchalla16s-projects.vercel.app/api/keeper-cron)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Keeper returned non-200 status: $HTTP_CODE"
          else
            echo "SUCCESS: Alerts dispatched!"
          fi
