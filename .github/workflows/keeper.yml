name: SomniaWatch Keeper

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual run'

concurrency:
  group: somniawatch-keeper
  cancel-in-progress: false

jobs:
  keeper:
    name: Run Autonomous Keeper
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check KEEPER_CRON_URL secret
        shell: bash
        env:
          KEEPER_CRON_URL: ${{ secrets.KEEPER_CRON_URL }}
        run: |
          if [ -z "$KEEPER_CRON_URL" ]; then
            echo "::error::KEEPER_CRON_URL secret is missing!"
            echo "Go to: Repo → Settings → Secrets → Actions → Add KEEPER_CRON_URL"
            echo "Value: your Vercel keeper-cron endpoint URL (from vercel.json crons config)"
            exit 1
          fi
          echo "✅ KEEPER_CRON_URL is set"
          # Mask the URL in logs
          echo "::add-mask::$KEEPER_CRON_URL"

      - name: Trigger Vercel Keeper Cron
        id: trigger
        shell: bash
        env:
          KEEPER_CRON_URL: ${{ secrets.KEEPER_CRON_URL }}
        run: |
          echo "🚀 Triggering SomniaWatch keeper at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📡 Calling Vercel keeper endpoint..."

          HTTP_STATUS=$(curl -s -o /tmp/keeper_response.json -w "%{http_code}" \
            -X GET \
            -H "Content-Type: application/json" \
            --max-time 300 \
            --retry 3 \
            --retry-delay 10 \
            --retry-connrefused \
            "$KEEPER_CRON_URL")

          echo "📊 HTTP Status: $HTTP_STATUS"
          echo "📄 Response:"
          cat /tmp/keeper_response.json 2>/dev/null || echo "(no response body)"
          echo ""

          # Accept 200 and 202 as success
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 202 ]; then
            echo "✅ Keeper triggered successfully (HTTP $HTTP_STATUS)"
            echo "status=success" >> $GITHUB_OUTPUT
          elif [ "$HTTP_STATUS" -eq 429 ]; then
            echo "::warning::Rate limited by Vercel (HTTP 429) — skipping this cycle"
            echo "status=rate_limited" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$HTTP_STATUS" -eq 0 ]; then
            echo "::error::Could not reach Vercel endpoint — check your deployment is live"
            echo "status=unreachable" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::error::Keeper returned HTTP $HTTP_STATUS"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Report run summary
        if: always()
        shell: bash
        run: |
          echo "======================================================"
          echo "  SomniaWatch Keeper — Run Report"
          echo "  Time     : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Outcome  : ${{ steps.trigger.outcome }}"
          echo "  Status   : ${{ steps.trigger.outputs.status }}"
          echo "  Next run : $(date -u -d '+6 hours' '+%Y-%m-%d %H:%M UTC' 2>/dev/null || date -u '+next scheduled run')"
          echo "======================================================"
