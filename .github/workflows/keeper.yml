name: SomniaWatch Keeper - 5min Autonomous Alerts

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes, 24/7, free on GitHub Actions
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger SomniaWatch Keeper Cron
        run: |
          echo "Triggering SomniaWatch keeper at $(date)"
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Accept: application/json" \
            "${{ secrets.KEEPER_CRON_URL }}")
          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json
          if [ "$RESPONSE" = "200" ]; then
            DISCORD=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('alerts',{}).get('discord','?'))" 2>/dev/null || echo 'N/A')
            TELEGRAM=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('alerts',{}).get('telegram','?'))" 2>/dev/null || echo 'N/A')
            echo "Discord: $DISCORD"
            echo "Telegram: $TELEGRAM"
            echo "Keeper ran successfully!"
          else
            echo "WARNING: Keeper cron returned HTTP $RESPONSE (check Vercel env vars)"
            echo "This is a warning only - not failing the workflow"
          fi
