name: SomniaWatch Keeper

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual run'

jobs:
  keeper:
    name: Run Autonomous Keeper
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run keeper (real on-chain agent calls)
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SOMNIA_RPC: ${{ secrets.SOMNIA_RPC }}
          SOMNIAWATCH_ADDRESS: ${{ secrets.SOMNIAWATCH_ADDRESS }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/keeper-standalone.js

      - name: Report status
        if: always()
        run: echo "Keeper run completed at $(date -u)"
