name: SomniaWatch Keeper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual run'

concurrency:
  group: somniawatch-keeper
  cancel-in-progress: false

jobs:
  keeper:
    name: Run Autonomous Keeper
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate secret and trigger keeper
        shell: bash
        env:
          KEEPER_CRON_URL: ${{ secrets.KEEPER_CRON_URL }}
        run: |
          echo "========================================="
          echo " SomniaWatch Keeper - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================="

          # --- Validate secret exists ---
          if [ -z "$KEEPER_CRON_URL" ]; then
            echo "::error::KEEPER_CRON_URL secret is not set!"
            echo "Fix: Go to Settings > Secrets > Actions > Add KEEPER_CRON_URL"
            echo "Value must be: https://somniawatch-eight.vercel.app/api/keeper-cron"
            exit 1
          fi

          # --- Print masked URL for debug ---
          DOMAIN=$(echo "$KEEPER_CRON_URL" | sed 's|https\?://||' | cut -d'/' -f1)
          echo "Calling domain: $DOMAIN"

          # --- DNS check before curl ---
          if ! nslookup "$DOMAIN" > /dev/null 2>&1; then
            echo "::error::DNS resolution failed for $DOMAIN"
            echo "Check that KEEPER_CRON_URL is set to a valid Vercel URL"
            exit 1
          fi
          echo "DNS OK for $DOMAIN"

          # --- Call Vercel endpoint ---
          echo "Triggering keeper..."
          HTTP_STATUS=$(curl -s \
            -o /tmp/resp.json \
            -w "%{http_code}" \
            --max-time 540 \
            --connect-timeout 30 \
            -X GET \
            -H "Accept: application/json" \
            "$KEEPER_CRON_URL" 2>/tmp/curl_err.txt)

          CURL_EXIT=$?
          echo "Curl exit code: $CURL_EXIT"
          echo "HTTP Status: $HTTP_STATUS"

          # Show curl error if any
          if [ -s /tmp/curl_err.txt ]; then
            echo "Curl stderr:"
            cat /tmp/curl_err.txt
          fi

          # Show response body
          echo "--- Response body ---"
          cat /tmp/resp.json 2>/dev/null | head -100 || echo "(empty)"
          echo "--- End response ---"

          # Handle curl errors
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::curl failed with exit code $CURL_EXIT"
            echo "Exit code meanings: 6=DNS fail, 7=connect fail, 28=timeout, 35=SSL fail"
            exit 1
          fi

          # Handle HTTP status
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 202 ]; then
            echo "SUCCESS: Keeper ran (HTTP $HTTP_STATUS)"
          elif [ "$HTTP_STATUS" -eq 500 ]; then
            echo "::warning::Keeper returned HTTP 500 - Vercel function error (contract or env var issue)"
            echo "Check: PRIVATE_KEY and SOMNIAWATCH_ADDRESS set in Vercel env vars"
            exit 1
          elif [ "$HTTP_STATUS" -eq 429 ]; then
            echo "::warning::Rate limited (HTTP 429) - skipping this cycle"
            exit 0
          else
            echo "::error::Unexpected HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "========================================="
          echo " Keeper complete!"
          echo "========================================="
